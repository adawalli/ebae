name: docker

# Release flow: push a semver tag (v0.1.0) -> builds + pushes docker.io/adawalli/ebae:0.1.0
# (+ :latest). The gitops ArgoCD Image Updater only promotes bare-semver tags, so the
# tag pattern below is load-bearing. PRs build the image to catch Dockerfile breakage
# but never push.
on:
  push:
    tags: ["v*.*.*"]
  pull_request:

# Least privilege: this workflow only reads the repo and pushes to Docker Hub
# (via DOCKERHUB_* secrets, not GITHUB_TOKEN). It never needs write scopes.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: docker.io/adawalli/ebae
          # {{version}} strips the v: v0.1.0 -> 0.1.0. Default flavor also tags :latest
          # on a semver tag. Image Updater ignores :latest (allowTags is bare-semver only).
          tags: type=semver,pattern={{version}}
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          # metadata-action's {{version}} is the bare semver (0.1.0); bake it into the image
          # so status.version reflects the pushed tag, not package.json.
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          platforms: linux/amd64 # Talos-on-Proxmox is amd64; add arm64 only if a node needs it
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
