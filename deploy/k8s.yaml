# Single replica only: the poll timers and seen-item cache live in process memory.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ebae
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ebae
  template:
    metadata:
      labels:
        app: ebae
    spec:
      containers:
        - name: ebae
          image: docker.io/adawalli/ebae:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: ebae-env
          # Liveness only, no readiness: with replicas:1 + Recreate there is no second endpoint
          # to shift traffic to, so a readiness 503 on a wedge would just black out the status
          # UI an operator needs. Deliberately lax (~5 min of failures before a kill): a boot-time
          # DB outage 503s while tryBoot retries every 15s, and restarting the pod won't fix that.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ebae
spec:
  selector:
    app: ebae
  ports:
    - port: 80
      targetPort: 3000
---
